server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: status
            values: ["running"]
    relabel_configs:
      - replacement: docker
        target_label: job
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_id']
        regex: '(.{12}).*'
        target_label: 'container_id'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        regex: ''
        action: drop

  - job_name: host
    static_configs:
      - targets:
          - localhost
        labels:
          job: host
          __path__: /var/log/host/*.log
      - targets:
          - localhost
        labels:
          job: host
          source: syslog
          __path__: /var/log/host/syslog
      - targets:
          - localhost
        labels:
          job: host
          source: auth
          __path__: /var/log/host/auth.log
      - targets:
          - localhost
        labels:
          job: host
          source: kern
          __path__: /var/log/host/kern.log
